<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Soporte B2B - Inteligencia Artificial</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="config.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-slate-800 rounded-2xl shadow-2xl p-6 border border-slate-700">
        <div class="flex items-center gap-3 mb-6">
            <div class="bg-indigo-600 p-2 rounded-lg text-2xl">🤖</div>
            <div>
                <h1 class="text-xl font-bold text-white">Módulo de Reportes Especializados</h1>
                <p class="text-xs text-slate-400">Automatizado con n8n Agent IA & Groq Cloud</p>
            </div>
        </div>

        <form id="ticketForm" class="space-y-4">
            <div>
                <label for="mensaje" class="block text-sm font-medium text-slate-300 mb-2">
                    Describe detalladamente la falla técnica o el incidente:
                </label>
                <textarea 
                    id="mensaje" 
                    rows="6" 
                    required
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl p-3 text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                    placeholder="Ej: Estimado equipo, registramos una caída crítica en nuestro entorno de producción desde las 08:00 AM..."
                ></textarea>
            </div>

            <div>
                <label for="formRole" class="block text-sm font-medium text-slate-300 mb-2">Rol:</label>
                <select
                    id="formRole"
                    class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all"
                >
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Docente</option>
                    <option value="administrativo">Administrativo</option>
                </select>
            </div>

            <button
                type="submit"
                id="btnEnviar"
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 px-4 rounded-xl transition-colors cursor-pointer flex items-center justify-center gap-2"
            >
                <span id="btnText">Enviar Incidente a Clasificación IA</span>
                <svg id="spinner" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>
        </form>

        <div id="resultado" class="mt-6 p-4 rounded-xl hidden">
            <p id="resultadoText" class="text-sm font-medium"></p>
        </div>
    </div>

    <!-- Chat Widget -->
    <div id="chatWidget" class="fixed bottom-6 right-6 z-50 flex flex-col items-end gap-3">

        <div id="chatPanel" class="hidden w-80 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 flex flex-col overflow-hidden" style="height:460px">
            <div class="bg-indigo-700 px-4 py-3 flex items-center justify-between flex-shrink-0">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-emerald-400 rounded-full"></div>
                    <span class="text-white font-semibold text-sm">Agente de Soporte IA</span>
                </div>
                <button id="closeChat" class="text-white/60 hover:text-white transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <div class="px-4 pt-3 pb-2 border-b border-slate-700 flex items-center gap-2 flex-shrink-0">
                <label for="chatRole" class="text-xs text-slate-400">Rol:</label>
                <select
                    id="chatRole"
                    class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-2 py-1 text-xs text-slate-200 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                >
                    <option value="estudiante">Estudiante</option>
                    <option value="docente">Docente</option>
                    <option value="administrativo">Administrativo</option>
                </select>
            </div>

            <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-3">
                <div class="flex">
                    <div class="bg-slate-700 rounded-2xl rounded-tl-sm px-3 py-2 text-sm text-slate-200 max-w-xs leading-relaxed">
                        Hola, describe tu incidente y lo analizo para ti.
                    </div>
                </div>
            </div>

            <div class="p-3 border-t border-slate-700 flex-shrink-0">
                <div class="flex gap-2">
                    <input
                        id="chatInput"
                        type="text"
                        placeholder="Escribe tu incidente..."
                        class="flex-1 bg-slate-950 border border-slate-700 rounded-xl px-3 py-2 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:ring-1 focus:ring-indigo-500"
                    />
                    <button
                        id="sendChatMsg"
                        class="bg-indigo-600 hover:bg-indigo-500 text-white p-2 rounded-xl transition-colors flex-shrink-0"
                    >
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <button id="chatToggle" class="bg-indigo-600 hover:bg-indigo-500 w-14 h-14 rounded-full shadow-xl flex items-center justify-center transition-all hover:scale-110">
            <svg id="iconChat" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
            </svg>
            <svg id="iconClose" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>

    <script>
        // Chat widget
        const chatPanel    = document.getElementById('chatPanel');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput    = document.getElementById('chatInput');
        const chatRole     = document.getElementById('chatRole');
        const iconChat     = document.getElementById('iconChat');
        const iconClose    = document.getElementById('iconClose');

        function toggleChat() {
            chatPanel.classList.toggle('hidden');
            iconChat.classList.toggle('hidden');
            iconClose.classList.toggle('hidden');
        }

        document.getElementById('chatToggle').addEventListener('click', toggleChat);
        document.getElementById('closeChat').addEventListener('click', toggleChat);

        function addBubble(text, isUser) {
            const row = document.createElement('div');
            row.className = isUser ? 'flex justify-end' : 'flex';
            const bubble = document.createElement('div');
            bubble.className = isUser
                ? 'bg-indigo-600 rounded-2xl rounded-tr-sm px-3 py-2 text-sm text-white max-w-xs leading-relaxed'
                : 'bg-slate-700 rounded-2xl rounded-tl-sm px-3 py-2 text-sm text-slate-200 max-w-xs leading-relaxed';
            bubble.textContent = text;
            row.appendChild(bubble);
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function addTyping() {
            const row = document.createElement('div');
            row.id = 'typing';
            row.className = 'flex';
            row.innerHTML = '<div class="bg-slate-700 rounded-2xl rounded-tl-sm px-3 py-2 text-sm text-slate-400">Analizando...</div>';
            chatMessages.appendChild(row);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendChat() {
            const text = chatInput.value.trim();
            if (!text) return;
            chatInput.value = '';
            addBubble(text, true);
            addTyping();
            document.getElementById('sendChatMsg').disabled = true;

            try {
                const res = await fetch(CONFIG.N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mensaje_estudiante: text, rol: chatRole.value })
                });
                const data = await res.json();
                document.getElementById('typing')?.remove();
                const reply = data.output || data.response_ai_agent || data.message || 'Incidente recibido y procesado correctamente.';
                addBubble(reply, false);
            } catch {
                document.getElementById('typing')?.remove();
                addBubble('Error al conectar con el servidor. Intenta de nuevo.', false);
            } finally {
                document.getElementById('sendChatMsg').disabled = false;
            }
        }

        document.getElementById('sendChatMsg').addEventListener('click', sendChat);
        chatInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });
    </script>

    <script>
        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault(); // Evita que la página se recargue

            const N8N_WEBHOOK_URL = CONFIG.N8N_WEBHOOK_URL;

            const mensajeTexto = document.getElementById('mensaje').value;
            const btnEnviar = document.getElementById('btnEnviar');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const resultadoBox = document.getElementById('resultado');
            const resultadoText = document.getElementById('resultadoText');

            // Interfaz en modo "Procesando..."
            btnEnviar.disabled = true;
            btnEnviar.classList.add('opacity-50', 'cursor-not-allowed');
            btnText.innerText = 'La IA está analizando el caso...';
            spinner.classList.remove('hidden');
            resultadoBox.classList.add('hidden');

            try {
                // Petición HTTP POST enviando el JSON estructurado
                const response = await fetch(N8N_WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        mensaje_estudiante: mensajeTexto,
                        rol: document.getElementById('formRole').value
                    })
                });

                if (response.ok) {
                    // Si n8n responde exitosamente
                    resultadoBox.className = "mt-6 p-4 rounded-xl bg-emerald-950/50 border border-emerald-500/30 text-emerald-400";
                    resultadoText.innerText = "✅ ¡Éxito! El incidente fue analizado por la IA, registrado en Google Sheets y notificado en el Telegram del equipo técnico.";
                    document.getElementById('mensaje').value = ''; // Limpiar formulario
                } else {
                    throw new Error('Error en la respuesta del servidor');
                }

            } catch (error) {
                // Captura de errores de red o caídas
                resultadoBox.className = "mt-6 p-4 rounded-xl bg-rose-950/50 border border-rose-500/30 text-rose-400";
                resultadoText.innerText = "❌ Error al conectar con el servidor de n8n. Revisa la consola o verifica la URL del Webhook.";
                console.error('Detalle del error:', error);
            } finally {
                // Restaurar la interfaz del botón
                btnEnviar.disabled = false;
                btnEnviar.classList.remove('opacity-50', 'cursor-not-allowed');
                btnText.innerText = 'Enviar Incidente a Clasificación IA';
                spinner.classList.add('hidden');
                resultadoBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
